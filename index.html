<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Elden Ring · Чек-лист квестов</title>
    <meta name="description" content="Чек-лист квестов Elden Ring и Shadow of the Erdtree: шаги, точки провала, кросс-квесты, диалоги, награды.">
    <link rel="shortcut icon" type="image/x-icon" href="https://eldenring.wiki.fextralife.com/file/Elden-Ring/elden-ring-wiki-guide-favicon-32.png">
    <meta name="google-site-verification" content="5A0CQYZFjRKNwjehcgPWJ0MUP-4ll_k15PUs_9xIux0">
    <link rel="stylesheet" href="assets/styles.css">
</head>
<body>

<aside class="sidebar">
    <div class="sidebar-header">
        <h2 class="sidebar-title">⚔ ELDEN RING</h2>
        <div class="sidebar-subtitle">Чек-лист квестов</div>
        <div class="quest-type-toggle">
            <button id="main-quests-toggle" class="active">Междуземье</button>
            <button id="dlc-quests-toggle">Земли Теней</button>
        </div>
    </div>

    <div class="sidebar-filters">
        <label>
            <input type="checkbox" id="filter-hide-completed"> Скрыть выполненные
        </label>
    </div>

    <div class="quest-list-wrap">
        <ul id="quest-list" class="quest-list"></ul>
    </div>

    <div class="save-load">
        <button id="save-progress" title="Скачать JSON с прогрессом">Сохранить</button>
        <input type="file" id="load-file" accept=".json" hidden>
        <label for="load-file" title="Загрузить JSON с прогрессом">Загрузить</label>
    </div>
</aside>

<main class="content">
    <div class="content-header">
        <div class="search-box">
            <input type="text" id="search-input" placeholder="Поиск по квестам, шагам, предметам, локациям…">
        </div>
        <div class="progress-summary" id="progress-summary"></div>
    </div>

    <div id="quests-container">
        <div class="loading">Загрузка квестов…</div>
    </div>
</main>

<script src="assets/app.js"></script>
</body>
</html>
